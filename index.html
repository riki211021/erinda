<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Quiz Budaya Indonesia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HALAMAN PETA -->
<div id="mapPage">
  <h1>Pilih Daerah</h1>
  <div class="map-container">
    <img src="assets/map.png" class="map">

    <button class="region" style="top:60%; left:80%;" onclick="startQuiz('papua')">
      Papua
    </button>

    <button class="region" style="top:65%; left:45%;" onclick="startQuiz('jawa')">
      Jawa
    </button>
  </div>
</div>

<!-- HALAMAN QUIZ -->
<div id="quizPage">
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<script src="script.js"></script>
</body>
</html>
